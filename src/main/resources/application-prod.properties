# ── Production Profile ────────────────────────────────────
# Activated via: --spring.profiles.active=prod

spring.datasource.url=${SEVAK_DB_URL}
spring.datasource.username=${SEVAK_DB_USER}
spring.datasource.password=${SEVAK_DB_PASSWORD}
spring.datasource.hikari.connection-init-sql=SET search_path = sevak
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.data-source-properties.sslmode=require
spring.datasource.hikari.connection-timeout=10000

server.port=${PORT:8080}
